<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Particle Life Simulator</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <canvas id="simCanvas"></canvas>
    
    <div id="ui-panel">
      <h2>Particle Life Controls</h2>
      
      <div class="control-group">
        <label>Particles: <span id="countVal">1000</span></label>
        <input type="range" id="particleCount" min="100" max="10000" step="100" value="1000">
      </div>

      <div class="control-group">
        <label>Force Multiplier: <span id="forceVal">1.0</span></label>
        <input type="range" id="forceMultiplier" min="0.1" max="5" step="0.1" value="1.0">
      </div>
      
      <div class="control-group">
        <label>Friction: <span id="frictionVal">0.85</span></label>
        <input type="range" id="friction" min="0.5" max="0.99" step="0.01" value="0.85">
      </div>

      <div class="control-group">
        <label>Max Distance: <span id="distVal">80</span></label>
        <input type="range" id="maxDistance" min="20" max="200" step="5" value="80">
      </div>

      <h3>Interaction Matrix (R, G, B, Y, P)</h3>
      <div class="matrix-grid">
        <div class="matrix-row">
          <input type="range" id="m00" min="-1" max="1" step="0.05" class="slider-red">
          <input type="range" id="m01" min="-1" max="1" step="0.05" class="slider-green">
          <input type="range" id="m02" min="-1" max="1" step="0.05" class="slider-blue">
          <input type="range" id="m03" min="-1" max="1" step="0.05" class="slider-yellow">
          <input type="range" id="m04" min="-1" max="1" step="0.05" class="slider-purple">
        </div>
        <div class="matrix-row">
          <input type="range" id="m10" min="-1" max="1" step="0.05" class="slider-red">
          <input type="range" id="m11" min="-1" max="1" step="0.05" class="slider-green">
          <input type="range" id="m12" min="-1" max="1" step="0.05" class="slider-blue">
          <input type="range" id="m13" min="-1" max="1" step="0.05" class="slider-yellow">
          <input type="range" id="m14" min="-1" max="1" step="0.05" class="slider-purple">
        </div>
        <div class="matrix-row">
          <input type="range" id="m20" min="-1" max="1" step="0.05" class="slider-red">
          <input type="range" id="m21" min="-1" max="1" step="0.05" class="slider-green">
          <input type="range" id="m22" min="-1" max="1" step="0.05" class="slider-blue">
          <input type="range" id="m23" min="-1" max="1" step="0.05" class="slider-yellow">
          <input type="range" id="m24" min="-1" max="1" step="0.05" class="slider-purple">
        </div>
        <div class="matrix-row">
          <input type="range" id="m30" min="-1" max="1" step="0.05" class="slider-red">
          <input type="range" id="m31" min="-1" max="1" step="0.05" class="slider-green">
          <input type="range" id="m32" min="-1" max="1" step="0.05" class="slider-blue">
          <input type="range" id="m33" min="-1" max="1" step="0.05" class="slider-yellow">
          <input type="range" id="m34" min="-1" max="1" step="0.05" class="slider-purple">
        </div>
        <div class="matrix-row">
          <input type="range" id="m40" min="-1" max="1" step="0.05" class="slider-red">
          <input type="range" id="m41" min="-1" max="1" step="0.05" class="slider-green">
          <input type="range" id="m42" min="-1" max="1" step="0.05" class="slider-blue">
          <input type="range" id="m43" min="-1" max="1" step="0.05" class="slider-yellow">
          <input type="range" id="m44" min="-1" max="1" step="0.05" class="slider-purple">
        </div>
      </div>
      
      <button id="randomizeBtn">Randomize Physics</button>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
